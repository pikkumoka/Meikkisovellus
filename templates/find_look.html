{% extends "layout.html" %}

{% block title %}Etsi lookkeja{% endblock %}

{% block content %}

<h2>Etsi lookkia</h2>

<form action="/find_look" method="get">
	<p>
		Hakusana : <input type="text" name="query" value="{{ query }}">
	</p>
	<input type="submit" value="Etsi">
</form>

{% if query %}
<h2>Lookit</h2>

<ul>
	{% for look in results %}
	<li><a href="/look/{{ look.id }}">{{ look.title }}</a></li>
	{% endfor %}
</ul>
{% endif %}
{% endblock %}
