{% extends "layout.html" %}

{% block title %}Poista look{% endblock %}

{% block content %}

<h2>Oletko varma lookin poistosta?</h2>
  <p><b>Lookki -</b> {{ look.title }}</p>
  <p>Et voi perua tätä toimintoa.</p>
  <form action="/remove_look/{{ look.id }}" method="post">
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
  <input type="submit" name="remove" value="Poista lookki">
  <input type="submit" name="back" value="Palaa takaisin">
  </form>

{% endblock %}
