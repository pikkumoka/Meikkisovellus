{% extends "layout.html" %}

{% block title %}Luo tunnus{% endblock %}

{% block content %}

<h2>{{ user.username }}n profiili</h2>
<p>
	Yhteensä {{ looks | count }} julkaistua lookkia
</p>
<h3>Julkaistut lookit</h3>
<ul>
	{% for look in looks %}
	<li><a href="/look/{{ look.id }}">{{ look.title }}</a></li>
	{% endfor %}
</ul>

{% endblock %}
